<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Página não encontrada | Speed Informática SM</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .not-found {
        max-width: 620px;
        width: 100%;
        padding: 28px;
        border-radius: 28px;
        border: 1px solid rgba(168, 203, 224, 0.16);
        background: rgba(12, 28, 42, 0.9);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .not-found p {
        color: #a6bed0;
        line-height: 1.7;
      }

      .not-found .cta {
        margin-top: 18px;
        display: inline-flex;
      }
    </style>
  </head>
  <body>
    <section class="not-found">
      <p class="eyebrow">404</p>
      <h1>Página não encontrada</h1>
      <p>Use a navegação para voltar para a página inicial da Speed Informática SM.</p>
      <a class="cta" href="./">Ir para a home</a>
    </section>
  </body>
</html>
